name: News Scraper

on:
  schedule:
    # každý den v 7:00 UTC (= 9:00 CEST)
    - cron: "0 7 * * *"
  workflow_dispatch:   # možnost spustit ručně z GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scraper.py
