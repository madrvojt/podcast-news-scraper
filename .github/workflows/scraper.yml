name: News Scraper

on:
  schedule:
    - cron: "0 7 * * *"  # každý den v 7:00 UTC (= 9:00 CEST)
  workflow_dispatch:      # možnost spustit ručně

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scraper.py

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "chore: update news $(date -u '+%Y-%m-%d %H:%M')"
          git push
